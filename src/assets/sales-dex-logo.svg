<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Sales Dex logo</title>
  <desc id="desc">A premium red handheld Salesforce org device with a large blue SF badge.</desc>
  <defs>
    <linearGradient id="body" x1="88" x2="426" y1="36" y2="474" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff6866"/>
      <stop offset=".42" stop-color="#f3293c"/>
      <stop offset="1" stop-color="#b90e2d"/>
    </linearGradient>
    <linearGradient id="bodyGloss" x1="75" x2="426" y1="45" y2="202" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".38"/>
      <stop offset=".6" stop-color="#ffffff" stop-opacity=".08"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="lens" x1="58" x2="149" y1="55" y2="157" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#bafcff"/>
      <stop offset=".5" stop-color="#26caf4"/>
      <stop offset="1" stop-color="#0089d7"/>
    </linearGradient>
    <linearGradient id="badge" x1="279" x2="451" y1="280" y2="454" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#20bdf1"/>
      <stop offset="1" stop-color="#0176d3"/>
    </linearGradient>
    <linearGradient id="button" x1="71" x2="136" y1="323" y2="403" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffe45c"/>
      <stop offset="1" stop-color="#ffc226"/>
    </linearGradient>
    <filter id="badgeShadow" width="140%" height="140%" x="-20%" y="-16%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" flood-color="#003d72" flood-opacity=".24" stdDeviation="12"/>
    </filter>
  </defs>

  <g filter="url(#cardShadow)">
    <rect x="30" y="24" width="452" height="464" rx="92" fill="url(#body)"/>
    <rect x="50" y="45" width="412" height="128" rx="62" fill="url(#bodyGloss)"/>
    <path d="M88 466h281c43 0 80-29 91-69-55 43-122 64-202 64H96c-5 0-8 2-8 5Z" fill="#7b0c22" opacity=".2"/>
    <path d="M118 35h250c55 0 101 41 107 95" fill="none" stroke="#ff908a" stroke-linecap="round" stroke-width="8" opacity=".5"/>
  </g>

  <path d="M35 235h159c54 0 92-27 127-72 28-35 64-60 119-60h42" fill="none" stroke="#17212f" stroke-linecap="round" stroke-width="28"/>
  <path d="M35 262h178c58 0 99-31 135-76 24-30 53-51 96-51h37" fill="none" stroke="#8f1027" stroke-linecap="round" stroke-width="10" opacity=".82"/>
  <path d="M35 251h171c57 0 97-30 132-74 24-30 55-53 104-53h40" fill="none" stroke="#2b3644" stroke-linecap="round" stroke-width="8" opacity=".45"/>

  <circle cx="90" cy="88" r="44" fill="#f4fbff"/>
  <circle cx="90" cy="88" r="36" fill="url(#lens)"/>
  <ellipse cx="78" cy="72" rx="21" ry="13" fill="#d9fbff" opacity=".58" transform="rotate(-18 78 72)"/>
  <circle cx="90" cy="88" r="41" fill="none" stroke="#ffffff" stroke-width="4" opacity=".78"/>

  <circle cx="165" cy="70" r="10" fill="#ff6262" stroke="#961329" stroke-width="5"/>
  <circle cx="198" cy="70" r="10" fill="#ffd84d" stroke="#a16a06" stroke-width="5"/>
  <circle cx="231" cy="70" r="10" fill="#39d36a" stroke="#117c3b" stroke-width="5"/>

  <path d="M72 322v64c0 14 16 21 27 13l43-34c10-8 9-23-2-31l-43-31c-10-8-25 0-25 19Z" fill="url(#button)" stroke="#b77608" stroke-linejoin="round" stroke-width="6"/>
  <path d="M91 324l42 31-42 33Z" fill="#fff3a3" opacity=".25"/>

  <rect x="195" y="424" width="118" height="14" rx="7" fill="#941027" opacity=".72"/>

  <g filter="url(#badgeShadow)">
    <circle cx="362" cy="338" r="101" fill="url(#badge)"/>
    <circle cx="362" cy="338" r="96" fill="none" stroke="#ffffff" stroke-width="7" opacity=".9"/>
  
    <text x="362" y="380" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="112" font-weight="760" text-anchor="middle">SF</text>
  </g>
</svg>


  
